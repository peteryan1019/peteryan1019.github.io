server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compress text assets
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/javascript application/xml application/xml+rss image/svg+xml;

    # Single-page app: send unknown routes to index.html so React Router can handle them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets can be cached forever
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # Always revalidate the HTML entry point
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
